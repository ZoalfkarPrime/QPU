services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qpu-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Qpu!Sql2022Pass"
    ports:
      - "14333:1433"
    volumes:
      - qpu-sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Qpu!Sql2022Pass\" -Q \"SELECT 1\" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"Qpu!Sql2022Pass\" -Q \"SELECT 1\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  qpu:
    build:
      context: .
      dockerfile: QPU/Dockerfile
    container_name: qpu-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      Database__ApplyMigrationsOnStartup: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=QPU;User Id=sa;Password=Qpu!Sql2022Pass;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  qpu-sqlserver-data: